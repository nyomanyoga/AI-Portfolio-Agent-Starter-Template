services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      target: development # Mengunci Docker agar menjalankan stage development saja
    ports:
      - "3000:5174" # Browser akses 3000 -> diteruskan ke Vite 5174
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - ./.env:/app/.env
      - portfolio_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: ["sh", "/app/docker/dev/start-dev.sh"]
    restart: always

volumes:
  portfolio_node_modules:
