server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy chat ke upstream API agar API key tidak terekspos ke browser
    location = /api/chat/output-stream {
        proxy_pass ${API_UPSTREAM_URL}/api/v1/run/${CHAT_RUN_ID}/output-stream;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header Connection "";
        proxy_set_header Authorization "Bearer ${CHAT_API_KEY}";

        # Wajib untuk streaming SSE: matikan buffering
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        gzip off;

        add_header Cache-Control no-cache;
        add_header X-Accel-Buffering no;
    }

    # SPA fallback: semua route dikembalikan ke React
    location / {
        try_files $uri $uri/ /index.html;
    }
}
